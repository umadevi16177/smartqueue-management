# nginx config for the SmartQueue frontend container.
# Serves the built React SPA on :8080 and proxies /api + /static to the backend.

server {
  listen       8080;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Long-cache hashed assets, no-cache HTML so deploys take effect immediately.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location ~ \.(?:html)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Backend JSON API.
  location /api/ {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;   # Mistral cold-start can take ~100s
  }

  # Backend-served static (floor maps).
  location /static/ {
    proxy_pass         http://backend:8000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
  }

  # SPA fallback — anything else falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
