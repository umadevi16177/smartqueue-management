services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartqueue-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Persist SQLite on the named volume.
      DATABASE_URL: sqlite:////data/smartqueue.db
      # Talk to Ollama running on the host machine.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - smartqueue-data:/data
    extra_hosts:
      # Lets `host.docker.internal` resolve on Linux (works natively on macOS / Windows).
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: smartqueue-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  smartqueue-data:
