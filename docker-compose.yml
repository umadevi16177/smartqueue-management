services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartqueue-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Talk to Postgres + Ollama running on the host machine. From inside
      # a container, `localhost` is the container itself — `host.docker.internal`
      # resolves to the host's gateway. The host's PostgreSQL must be
      # configured to accept connections from the Docker bridge:
      #   1. postgresql.conf:   listen_addresses = '*'
      #   2. pg_hba.conf:       host all all 172.17.0.0/16 md5
      #   3. restart Postgres
      DATABASE_URL: postgresql+psycopg2://postgres:devi177@host.docker.internal:5433/smartqueue
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      # Lets `host.docker.internal` resolve on Linux (works natively on macOS / Windows).
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: smartqueue-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
